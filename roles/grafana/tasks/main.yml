- name: Install dependencies
  apt:
    name:
      - curl
      - gnupg
      - apt-transport-https
    state: present
    update_cache: yes

- name: Add Grafana GPG key
  apt_key:
    url: https://packages.grafana.com/gpg.key
    state: present

- name: Add Grafana APT repo
  apt_repository:
    repo: "deb https://packages.grafana.com/oss/deb stable main"
    state: present

- name: Install Grafana
  apt:
    name: grafana
    state: present
    update_cache: yes

- name: Configure Grafana (basic)
  copy:
    dest: /etc/grafana/grafana.ini
    content: |
      [server]
      http_addr = 0.0.0.0
      http_port = 3000

- name: Enable and start Grafana
  systemd:
    name: grafana-server
    enabled: yes
    state: started
