- name: Install dependencies
  apt:
    name:
      - curl
      - gnupg
      - apt-transport-https
    state: present
    update_cache: yes

- name: Add Grafana GPG key
  apt_key:
    url: https://packages.grafana.com/gpg.key
    state: present

- name: Add Grafana APT repo
  apt_repository:
    repo: "deb https://packages.grafana.com/oss/deb stable main"
    state: present

- name: Install Loki
  apt:
    name: loki
    state: present
    update_cache: yes

- name: Configure Loki
  copy:
    dest: /etc/loki/local-config.yaml
    content: |
      auth_enabled: false
      server:
        http_listen_port: 3100
      ingester:
        wal:
          enabled: true
      storage_config:
        boltdb_shipper:
          active_index_directory: /var/lib/loki/index
          cache_location: /var/lib/loki/cache
          shared_store: filesystem
        filesystem:
          directory: /var/lib/loki/chunks

- name: Ensure Loki data directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /var/lib/loki
    - /var/lib/loki/index
    - /var/lib/loki/chunks

- name: Enable and start Loki service
  systemd:
    name: loki
    enabled: yes
    state: started
