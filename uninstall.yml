- name: Remove ELK stack completely
  hosts: all
  become: yes
  tasks:
    - name: Remove filebeat, kibana, elasticsearch with purge
      apt:
        name:
          - promtail
          - grafana
          - loki
        state: absent
        purge: yes
        autoremove: yes
    - name: Clean apt cache
      apt:
        clean: yes
    - name: Remove config directories
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/promtail
        - /etc/grafana
        - /etc/loki
        - /var/lib/promtail
        - /var/lib/loki
        - /var/lib/grafana