- name: Install Promtail on all VMs
  hosts: all
  become: yes
  roles:
    - promtail

- name: Install Grafana on vm2-dc1
  hosts: vm2-dc1
  become: yes
  roles:
    - grafana

- name: Install Loki on vm1-dc2
  hosts: vm1-dc2
  become: yes
  roles:
    - loki