- name: Install Filebeat on all VMs
  hosts: all
  become: yes
  roles:
    - filebeat

- name: Install Kibana on vm2-dc1
  hosts: vm2-dc1
  become: yes
  roles:
    - kibana

- name: Install Elasticsearch on vm1-dc2
  hosts: vm1-dc2
  become: yes
  roles:
    - elasticsearch